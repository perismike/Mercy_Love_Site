<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For Mercy 💛</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1 class="title">For Mercy</h1>

    <p class="subtitle">
      A place where love, memory, and strength live forever.
    </p>

    <div class="card">
      <p>
        Even though he is not physically here,<br>
        <span class="highlight">Marvin Kizito</span> still lives in your heart.
      </p>
    </div>

    <div class="buttons">

      <button onclick="lightCandle('Strength')">🕯️ Strength</button>
      <button onclick="lightCandle('Peace')">🕯️ Peace</button>
      <button onclick="lightCandle('Healing')">🕯️ Healing</button>
      <button onclick="lightCandle('Marvin')">🕯️ Marvin</button>

    </div>

    <div id="output" class="output"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
